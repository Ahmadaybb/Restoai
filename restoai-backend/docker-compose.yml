volumes:
  pgdata:
  redisdata:

services:
  db:
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    environment:
      POSTGRES_USER: restoai
      POSTGRES_PASSWORD: restoai
      POSTGRES_DB: restoai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U restoai" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://restoai:restoai@db:5432/restoai
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://restoai:restoai@db:5432/restoai
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data:ro
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://restoai:restoai@db:5432/restoai
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
