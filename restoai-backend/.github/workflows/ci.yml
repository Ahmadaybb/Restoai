name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: restoai
          POSTGRES_PASSWORD: restoai
          POSTGRES_DB: restoai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U restoai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Mypy — domain
        run: mypy app/domain/

      - name: Mypy — services
        run: mypy app/services/

      - name: Mypy — api
        run: mypy app/api/

      - name: Mypy — infra
        run: mypy app/infra/

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://restoai:restoai@localhost:5432/restoai
          REDIS_URL: redis://localhost:6379/0
          TELEGRAM_BOT_TOKEN: test-token
          GROQ_API_KEY: test-key
          DISPATCHER_API_TOKEN: test-dispatcher-token
          LOG_LEVEL: WARNING
        run: pytest --tb=short -q
